{% extends "layout.html" %}
{% block content %}

<style>
.page-title {
    font-size: 26px;
    margin-bottom: 25px;
    color: #0f3d1e;
}

.register-card {
    background: #f3eee4;
    padding: 35px;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    max-width: 900px;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

label {
    font-weight: 600;
    margin-bottom: 6px;
    color: #333;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

input:focus, select:focus {
    outline: none;
    border-color: #14532d;
    box-shadow: 0 0 5px rgba(20,83,45,0.3);
}

.full-width {
    grid-column: 1 / -1;
}

.btn-register {
    margin-top: 25px;
    padding: 12px 25px;
    background-color: #14532d;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
}

.btn-register:hover {
    background-color: #0f3d1e;
}

.note-text {
    margin-top: 15px;
    font-size: 13px;
    color: #555;
}
</style>

<h2 class="page-title">Farmer Registration</h2>

<div class="register-card">

    <form method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="name" required>
            </div>

            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Phone Number *</label>
                <input type="text" name="phone" required>
            </div>

            <div class="form-group">
                <label>Land Size (Acres) *</label>
                <input type="number" step="0.01" name="land_size" required>
            </div>

            <div class="form-group full-width">
                <label>Address *</label>
                <input type="text" name="address" required>
            </div>

            <div class="form-group">
                <label>Crop Type *</label>
                <select name="crop_type" required>
                    <option value="">Select Crop</option>
                    <option value="Wheat">Wheat</option>
                    <option value="Rice">Rice</option>
                    <option value="Corn">Corn</option>
                    <option value="Sugarcane">Sugarcane</option>
                    <option value="Vegetables">Vegetables</option>
                </select>
            </div>

            <div class="form-group">
                <label>Password *</label>
                <input type="password" name="password" required>
            </div>

        </div>

        <button type="submit" class="btn-register">
            Register Farmer
        </button>

    </form>

    <div class="note-text">
        By registering, you agree to the Agrocycle fertilizer and waste management policies.
    </div>

</div>

{% endblock %}
