<!DOCTYPE html>
<html>
<head>
    <title>Login - Agrocycle</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #0f3d1e, #14532d);
        }

        .login-container {
            background: #f3eee4;
            padding: 40px;
            width: 400px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #0f3d1e;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #14532d;
            box-shadow: 0 0 4px rgba(20,83,45,0.4);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #14532d;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #0f3d1e;
        }

        .error-message {
            background-color: #ffdddd;
            color: #b30000;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>

<body>

<div class="login-container">

    <h2>🌿 Agrocycle Login</h2>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="error-message">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="form-group">
            <label>Select Role</label>
            <select name="role" required>
                <option value="">-- Choose Role --</option>
                <option value="farmer">Farmer</option>
                <option value="company">Company</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn-login">Login</button>

    </form>

    <div class="footer-text">
        © 2026 Agrocycle | Sustainable Agriculture Platform
    </div>

</div>

</body>
</html>
